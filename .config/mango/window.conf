# Window effect

# once there was blur...

# once there were shadows...

border_radius=0
focused_opacity=1.0
unfocused_opacity=0.92

animations=0

# Scroller Layout Setting
scroller_structs=10
scroller_default_proportion=1.0
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_ignore_proportion_single=0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=1
axis_bind_apply_timeout=100
focus_on_activate=0
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
cursor_hide_timeout=1
enable_floating_snap=1
snap_distance=70
cursor_size=24
drag_tile_to_tile=1

# Appearance
gappih=0
gappiv=0
gappoh=0
gappov=0
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=2
rootcolor=0x201b14ff
bordercolor=0x444444ff
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# Window rules
# windowrule=Parameter:Values,title:Values
# windowrule=Parameter:Values,Parameter:Values,appid:Values,title:Values

windowrule=isfloating:1,appid:^zoom

# Giving each tag purpose

# tag 1 - browser

windowrule=tags:1,title:Brave

# tag 2 - coding

tagrule=id:2,layout_name:scroller
windowrule=tags:2,appid:Emacs
windowrule=tags:2,appid:kitty

# tag 3 - messaging

windowrule=tags:3,appid:org.telegram.desktop

# tag 4  - music

windowrule=tags:4,appid:org.gnome.Lollypop

# tag 5  - meeitngs

windowrule=tags:5,appid:obsidian
windowrule=tags:5,appid:zoom

# tag 6 - recording
#
windowrule=tags:6,appid:com.obsproject.Studio
